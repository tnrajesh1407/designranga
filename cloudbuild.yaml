# cloudbuild.yaml
# Google Cloud Build pipeline: build Docker image → push to Artifact Registry → deploy to Cloud Run
#
# Trigger this manually or connect to a GitHub repo in Cloud Build console.
#
# Required Cloud Build substitution variables (set in trigger config):
#   _REGION       : Cloud Run region, e.g. asia-south1 (Mumbai) or us-central1
#   _SERVICE_NAME : Cloud Run service name, e.g. designranga-admin
#   _PROJECT_ID   : GCP project ID (auto-set by Cloud Build as $PROJECT_ID)
#
# Secrets (set as env vars on the Cloud Run service, NOT here):
#   ANTHROPIC_API_KEY, REPLICATE_API_TOKEN
#   WOO_BASE_URL, WOO_CONSUMER_KEY, WOO_CONSUMER_SECRET
#   WP_USERNAME, WP_APP_PASSWORD
#   BLUEHOST_IP, ADMIN_PASSWORD, NEXT_PUBLIC_APP_URL

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: designranga-admin
  _IMAGE: asia-south1-docker.pkg.dev/$PROJECT_ID/designranga/$_SERVICE_NAME

steps:
  # 1 — Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--tag=$_IMAGE:$SHORT_SHA'
      - '--tag=$_IMAGE:latest'
      - '--cache-from=$_IMAGE:latest'
      - '.'
    timeout: '1200s'   # 20 min — npm ci + Next.js build can be slow

  # 2 — Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '$_IMAGE']

  # 3 — Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE_NAME'
      - '--image=$_IMAGE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'        # public admin URL — protected by ADMIN_PASSWORD cookie
      - '--memory=1Gi'                   # sharp + jszip need headroom
      - '--cpu=1'
      - '--concurrency=4'                # image processing is CPU-heavy; keep low
      - '--min-instances=0'              # scale to zero when idle
      - '--max-instances=3'
      - '--timeout=120'                  # 2 min — ZIP upload + image processing
      - '--set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1'
      - '--update-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,REPLICATE_API_TOKEN=replicate-api-token:latest,WOO_CONSUMER_KEY=woo-consumer-key:latest,WOO_CONSUMER_SECRET=woo-consumer-secret:latest,WP_APP_PASSWORD=wp-app-password:latest,ADMIN_PASSWORD=admin-password:latest'
      - '--update-env-vars=WOO_BASE_URL=https://designranga.com,WP_USERNAME=tnrajesh80,NEXT_PUBLIC_APP_URL=https://admin.designranga.com,BLUEHOST_IP=50.6.43.111'

images:
  - '$_IMAGE:$SHORT_SHA'
  - '$_IMAGE:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'   # faster builds
